services:
  backend:
    build: ./backend
    ports:
      - "3003:3003"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/api/health/live').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
